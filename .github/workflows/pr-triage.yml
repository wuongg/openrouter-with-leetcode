name: PR Triage

on:
    pull_request_target:
        types: [opened, synchronize]

jobs:
    triage:
        runs-on: ubuntu-latest
        if: >-
            github.repository == 'Stewie-pixel/claude-with-leetcode' &&
            github.actor != 'mirabile-cli[bot]'

        permissions:
            contents: read
            pull-requests: write
            issues: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Run Triage Script
              uses: actions/github-script@v9
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const { triage } = await import('${{ github.workspace }}/.github/scripts/pr-triage.mjs');
                      await triage({ github, context, core });
