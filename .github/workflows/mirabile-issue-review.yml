name: Issue Review

on:
    issue_comment:
        types: [created]
    issues:
        types: [opened, assigned]

jobs:
    review:
        if: >-
            github.actor != 'mirabile-cli[bot]' &&
            github.event.issue.pull_request == null &&
            (
              (github.event_name == 'issue_comment' &&
               contains(github.event.comment.body, '@mirabile') &&
               github.event.comment.user.login != 'mirabile-cli[bot]') ||
              (github.event_name == 'issues')
            )
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            issues: write
            id-token: write
            actions: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Run issue review
              uses: actions/github-script@v9
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
                  OPENROUTER_MODEL: 'nvidia/nemotron-3-super-120b-a12b:free'
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const issue = context.payload.issue;
                      const number = issue.number;
                      const title = issue.title;
                      const body = issue.body ?? '';
                      const author = issue.user.login;
                      const labels = issue.labels.map(l => l.name).join(', ');
                      const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${number}`;

                      const prompt = `You are Mirabile, an AI assistant integrated into the claude-with-leetcode GitHub repository — an open-source project that uses OpenRouter to automatically generate daily DSA (Data Structures & Algorithms) lectures from LeetCode solutions committed by developers.

                      Your job is to review the following GitHub issue and provide a structured, insightful analysis that helps the maintainer understand the issue quickly and act on it effectively.

                      ---

                      Issue Details:
                      Issue: #${number}
                      Link: ${url}
                      Author: @${author}
                      Labels: ${labels}
                      Title: ${title}
                      Description:
                      ${body}

                      ---

                      Analyze the issue below and respond with only this section:

                      ## Effort Analysis
                      One short and clear paragraph. Identify which parts of the codebase are affected (e.g. solution ingestion, OpenRouter prompt templates, lecture generation pipeline, output formatting, GitHub Actions workflow).
                      Note whether existing patterns or utilities can be reused, whether the change is additive or modifies core logic,
                      and close with an effort label: \`effort/small\` (1 day or less), \`effort/medium\` (2–3 days), or \`effort/large\` (4+ days).

                      Be concise, technical, and actionable. Do not repeat the issue title verbatim.`;

                      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                          method: 'POST',
                          headers: {
                              Authorization: `Bearer ${process.env.OPENROUTER_API_KEY}`,
                              'Content-Type': 'application/json',
                          },
                          body: JSON.stringify({
                              model: process.env.OPENROUTER_MODEL,
                              messages: [{ role: 'user', content: prompt }],
                          }),
                      });

                      const data = await response.json();
                      const review = data.choices?.[0]?.message?.content?.trim();

                      if (!review || review === 'null') {
                          core.info('No review generated, skipping comment.');
                          return;
                      }

                      const fullReview = `${review}\n\n---\n*Review generated by [@mirabile](https://github.com/apps/mirabile)*`;

                      await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: number,
                          body: fullReview,
                      });
