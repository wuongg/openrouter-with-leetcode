name: Push New Release Version

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Version tag to release'
                required: true
                type: string
    schedule:
        - cron: '0 0 * * *' # nightly at 00:00 UTC — adjust to taste

jobs:
    release:
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'Stewie-pixel/claude-with-leetcode' }}

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Determine release type
              id: release-type
              run: |
                  case "${{ github.event_name }}" in
                    schedule)
                      echo "type=nightly" >> $GITHUB_OUTPUT
                      ;;
                    workflow_dispatch)
                      echo "type=preview" >> $GITHUB_OUTPUT
                      ;;
                    push)
                      echo "type=pr" >> $GITHUB_OUTPUT
                      ;;
                    *)
                      echo "Unsupported event: ${{ github.event_name }}"
                      exit 1
                      ;;
                  esac

            - name: Resolve and Ensure Tag
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    TAG_NAME="${{ github.event.inputs.tag }}"
                  elif [ "${{ github.event_name }}" = "schedule" ]; then
                    LATEST_TAG=$(git tag --sort=-creatordate | head -n1)
                    if [ -z "$LATEST_TAG" ]; then
                      LATEST_TAG="v0.0.0"
                    fi
                    TAG_NAME="${LATEST_TAG}-nightly.$(date +%Y%m%d)"
                  else
                    TAG_NAME="${GITHUB_REF#refs/tags/}"
                  fi

                  echo "name=$TAG_NAME" >> $GITHUB_OUTPUT

                  if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
                    echo "Tag $TAG_NAME not found. Creating it now..."
                    git tag "$TAG_NAME"
                    git push origin "$TAG_NAME"
                  fi

            - name: Generate changelog entry
              id: gen-changelog
              run: |
                  TAG="${{ steps.tag.outputs.name }}"
                  VERSION="${TAG#v}"
                  DATE=$(date +%Y-%m-%d)

                  PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${TAG}$" | tail -n1)
                  if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
                    PREV_TAG=""
                  fi

                  if [ -n "$PREV_TAG" ]; then
                    RANGE="${PREV_TAG}..${TAG}"
                  else
                    RANGE="${TAG}"
                  fi

                  FEATS=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^feat" -i || true)
                  FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^fix" -i || true)
                  OTHERS=$(git log $RANGE --pretty=format:"- %s (%h)" --invert-grep --grep="^feat" --grep="^fix" -i || true)

                  {
                    echo "## [${VERSION}] - ${DATE}"
                    echo ""
                    if [ -n "$FEATS" ]; then
                      echo "### Added"
                      echo "$FEATS"
                      echo ""
                    fi
                    if [ -n "$FIXES" ]; then
                      echo "### Fixed"
                      echo "$FIXES"
                      echo ""
                    fi
                    if [ -n "$OTHERS" ]; then
                      echo "### Other"
                      echo "$OTHERS"
                      echo ""
                    fi
                  } > /tmp/new_entry.md

                  echo "Generated changelog entry for ${VERSION}:"
                  cat /tmp/new_entry.md

            - name: Commit changelog
              id: commit-changelog
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  TYPE="${{ steps.release-type.outputs.type }}"
                  TAG="${{ steps.tag.outputs.name }}"
                  VERSION="${TAG#v}"
                  TARGET_BRANCH="mirabile/release/${TAG}-${TYPE}-${{ github.run_id }}"

                  echo "branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT

                  git config user.name "mirabile-cli[bot]"
                  git config user.email "mirabile-cli[bot]@users.noreply.github.com"

                  git checkout -b $TARGET_BRANCH

                  if grep -q "^## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
                    echo "Changelog entry for ${VERSION} already exists on ${TARGET_BRANCH}, skipping insert."
                  else
                    touch CHANGELOG.md
                    cat /tmp/new_entry.md CHANGELOG.md > /tmp/CHANGELOG.tmp.md
                    mv /tmp/CHANGELOG.tmp.md CHANGELOG.md
                  fi

                  if git diff --quiet -- CHANGELOG.md; then
                    echo "No changelog changes to commit."
                  else
                    git add CHANGELOG.md
                    git commit -m "chore: update changelog for ${TAG} [skip ci]"
                    git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${TARGET_BRANCH}"
                  fi

            - name: Create release PR
              id: create-pr
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  TYPE="${{ steps.release-type.outputs.type }}"
                  TAG="${{ steps.tag.outputs.name }}"
                  TARGET_BRANCH="${{ steps.commit-changelog.outputs.branch }}"
                  TEMPLATE_PATH=".github/PULL_REQUEST_TEMPLATE.md"
                  PR_BODY_FILE="/tmp/pr_body.md"

                  if [ -f "$TEMPLATE_PATH" ]; then
                    cat "$TEMPLATE_PATH" > "$PR_BODY_FILE"
                    printf "\n---\n\n" >> "$PR_BODY_FILE"
                  fi
                  cat /tmp/new_entry.md >> "$PR_BODY_FILE"

                  gh pr create \
                    --repo "${{ github.repository }}" \
                    --base main \
                    --head "$TARGET_BRANCH" \
                    --title "chore: release ${TYPE} ${TAG}" \
                    --label "release,${TYPE}" \
                    --body-file "$PR_BODY_FILE"

            - name: Extract changelog entry
              id: changelog
              run: |
                  TAG="${{ steps.tag.outputs.name }}"
                  VERSION="${TAG#v}"

                  NOTES=$(awk \
                    "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
                    CHANGELOG.md)

                  if [ -z "$NOTES" ]; then
                    echo "No changelog entry found for ${TAG}."
                    echo "body=" >> $GITHUB_OUTPUT
                  else
                    echo "body<<EOF" >> $GITHUB_OUTPUT
                    echo "$NOTES" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                  fi

            - name: Upsert GitHub Release
              uses: actions/github-script@v9
              env:
                  RELEASE_BODY: ${{ steps.changelog.outputs.body }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const tag = '${{ steps.tag.outputs.name }}';
                      const body = process.env.RELEASE_BODY?.trim();
                      const { owner, repo } = context.repo;

                      let existingRelease = null;
                      try {
                          const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                          existingRelease = data;
                      } catch (err) {
                          if (err.status !== 404) throw err;
                      }

                      if (existingRelease) {
                          core.info(`Updating existing release: ${tag}`);
                          await github.rest.repos.updateRelease({
                              owner, repo,
                              release_id: existingRelease.id,
                              name: tag,
                              body: body || existingRelease.body,
                              prerelease: tag.includes('-')
                          });
                      } else {
                          core.info(`Creating new release: ${tag}`);
                          await github.rest.repos.createRelease({
                              owner, repo,
                              tag_name: tag,
                              name: tag,
                              body: body || undefined,
                              generate_release_notes: !body,
                              prerelease: tag.includes('-')
                          });
                      }
