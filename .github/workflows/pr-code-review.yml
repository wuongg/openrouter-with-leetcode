name: PR Code Review

on:
    pull_request_target:
        types: [opened]
    issue_comment:
        types: [created]

jobs:
    code-review:
        runs-on: ubuntu-latest
        if: >-
            github.repository == 'Stewie-pixel/claude-with-leetcode' &&
            github.actor != 'mirabile-cli[bot]' &&
            (
              github.event_name == 'pull_request_target' ||
              (github.event_name == 'issue_comment' &&
               github.event.issue.pull_request != null &&
               github.event.comment.user.login != 'mirabile-cli[bot]')
            )

        permissions:
            contents: read
            pull-requests: write
            issues: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Execute Code Review
              uses: actions/github-script@v9
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
                  OPENROUTER_MODEL: 'nvidia/nemotron-3-super-120b-a12b:free'
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const { review } = await import('${{ github.workspace }}/.github/scripts/pr-review.mjs');
                      await review({ github, context, core });
