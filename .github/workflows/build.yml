name: Build README

on:
    workflow_dispatch:
    push:
        branches: ['main']

    schedule:
        - cron: '0 * * * *'

jobs:
    build:
        runs-on: ubuntu-latest
        if: "!contains(github.event.head_commit.message, 'table')"

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.BOT_TOKEN }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20.x

            - name: Fetch LeetCode submissions and sync
              env:
                  LEETCODE_USERNAME: ${{ secrets.LEETCODE_USERNAME }}
                  LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
                  LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
              run: node syncLeetcode.js

            - name: Verify site data URLs
              run: node verifySiteData.js

            - name: Check for modified files
              id: git-check
              run: |
                  echo modified=$(if [ -z "$(git status --porcelain)" ]; then echo "false"; else echo "true"; fi) >> $GITHUB_OUTPUT

            - name: Push changes
              if: steps.git-check.outputs.modified == 'true'
              run: |
                  git config --global user.email "${{ secrets.BOT_EMAIL }}"
                  git config --global user.name "${{ secrets.BOT_USERNAME }}"
                  git add .
                  git commit -m "Update README table" || true
                  git push || (git pull --rebase && git push)
