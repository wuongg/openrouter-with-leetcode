name: Code Mentor

on:
    workflow_dispatch:
    push:
        branches: ['main']
        paths:
            - 'cpp/**'
            - 'python/**'
            - 'javascript/**'
            - 'java/**'
            - 'typescript/**'
            - 'c/**'
            - 'csharp/**'
            - 'go/**'
            - 'ruby/**'
            - 'swift/**'
            - 'kotlin/**'
            - 'rust/**'
            - 'scala/**'
            - 'dart/**'
            - 'dcc/cpp/**'
            - 'dcc/python/**'
            - 'dcc/javascript/**'
            - 'dcc/java/**'
            - 'dcc/typescript/**'
            - 'dcc/c/**'
            - 'dcc/csharp/**'
            - 'dcc/go/**'
            - 'dcc/ruby/**'
            - 'dcc/swift/**'
            - 'dcc/kotlin/**'
            - 'dcc/rust/**'
            - 'dcc/scala/**'
            - 'dcc/dart/**'

permissions:
    contents: write
    pull-requests: write

jobs:
    explain:
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'openrouter mentor analysis')
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x

            - name: Run OpenRouter DSA Mentor Analysis
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
                  SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
              run: node dsaMentor.js

            - name: Check for new analysis files
              id: git-check
              run: |
                  echo modified=$(if [ -z "$(git status --porcelain)" ]; then echo "false"; else echo "true"; fi) >> $GITHUB_OUTPUT

            - name: Create OpenRouter Analysis PR
              if: steps.git-check.outputs.modified == 'true'
              env:
                  GH_TOKEN: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
                  PR_BODY: |
                      ## Summary

                      Automated OpenRouter DSA mentor analysis generated for a new LeetCode solution.

                      This PR adds the generated explanation, complexity analysis, and learning notes
                      without modifying the original solution implementation.

                      ## Details

                      This PR was automatically created by the Code Mentor workflow.

                      Changes include:

                      - Generated ANALYSIS.md from OpenRouter mentor pipeline
                      - Added algorithm explanation
                      - Added complexity analysis
                      - Added implementation insights

                      Design decisions:

                      - ANALYSIS.md is generated only by CI
                      - Solution files remain untouched
                      - Analysis generation is isolated in a separate branch

                      ## Related Issues

                      No related issue. Automated mentor analysis generated by CI.

                      ## How to Validate

                      1. Checkout this PR branch:

                      ```bash
                      git checkout $BRANCH
                      ```

                      2. Verify generated files:

                      Expected:

                      - ANALYSIS.md exists in the problem directory
                      - Original solution remains unchanged
                      - Markdown renders correctly

                      3. Run solution tests if available.

                      ## Pre-Merge Checklist

                      - [x] Folder named correctly: {number}-{problem-slug}
                      - [x] Folder placed inside the correct language directory
                      - [x] Solution file naming preserved
                      - [x] README.md exists with LeetCode description
                      - [x] ANALYSIS.md generated by CI pipeline
                      - [x] No debug print statements introduced
                      - [x] PR description filled with Summary, Related Issue, and How to Validate
              run: |
                  git config --global user.email "${{ secrets.BOT_EMAIL }}"
                  git config --global user.name "${{ secrets.BOT_USERNAME }}"

                  BRANCH="openrouter/add-solution-analysis-${{ github.run_id }}"
                  git checkout -b $BRANCH

                  git add .
                  git commit -m "docs: add openrouter mentor analysis for new solution" || exit 0
                  git push origin $BRANCH

                  gh pr create \
                    --base main \
                    --head $BRANCH \
                    --title "docs: add openrouter mentor analysis for new solution" \
                    --body "$PR_BODY"
