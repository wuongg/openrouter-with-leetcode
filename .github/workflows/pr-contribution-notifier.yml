name: PR Contribution Notifier

on:
    pull_request:
        types: [opened]

jobs:
    notifier:
        runs-on: ubuntu-latest
        if: >-
            github.repository == 'Stewie-pixel/claude-with-leetcode' &&
            github.actor != 'mirabile-cli[bot]'

        permissions:
            contents: read
            pull-requests: write
            issues: write

        steps:
            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Check if first-time contributor
              id: contributor-check
              uses: actions/github-script@v7
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const contributor = context.payload.pull_request.user.login;

                      const prs = await github.paginate(
                          github.rest.pulls.list,
                          {
                              owner,
                              repo,
                              state: 'all',
                              per_page: 100,
                          }
                      );

                      const previousPRs = prs.filter(
                          pr => pr.user.login === contributor &&
                               pr.number !== context.payload.pull_request.number
                      );

                      core.setOutput('is_first_time', previousPRs.length === 0 ? 'true' : 'false');
                      console.log(`Contributor: @${contributor} | First time: ${previousPRs.length === 0}`);

            - name: Post welcome comment
              uses: actions/github-script@v7
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const prNumber = context.payload.pull_request.number;
                      const contributor = context.payload.pull_request.user.login;
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const isFirstTime = '${{ steps.contributor-check.outputs.is_first_time }}' === 'true';

                      const firstTimeGreeting = isFirstTime
                          ? `## 🎉 Welcome to claude-with-leetcode, @${contributor}!\n\nThis is your first contribution to this project — thank you so much for being here. We're excited to have you with us!\n`
                          : `## 👋 Welcome back, @${contributor}!\n\nThanks for another contribution — always great to see you here!\n`;

                      const comment = `${firstTimeGreeting}

                      ## 📋 Contribution Checklist

                      Before your PR is reviewed, please make sure the following are complete:

                      **Folder & File Structure**
                      - [ ] Problem folder named correctly: \`{number}-{problem-slug}\` e.g. \`1-two-sum\`
                      - [ ] Folder placed inside the correct language directory e.g. \`cpp/1-two-sum/\`
                      - [ ] Solution file named correctly: \`{slug}.{ext}\` e.g. \`two-sum.cpp\`

                      **Required Files**
                      - [ ] \`README.md\` exists in the problem folder with the LeetCode HTML description
                      - [ ] No \`ANALYSIS.md\` manually added (this is auto-generated by the CI pipeline)

                      **Code Quality**
                      - [ ] No debug print statements left in the solution
                      - [ ] PR description is filled in with Summary, Related Issue, and How to Validate

                      ## ⏱️ Review Timeline

                      | Stage | Estimated Time |
                      |---|---|
                      | Automated checks | ~1 minute |
                      | Maintainer review | Within 48 hours |
                      | Merge | After approval |

                      ## 🔗 Useful Links

                      - 📖 [CONTRIBUTING.md](https://github.com/Stewie-pixel/claude-with-leetcode/blob/main/CONTRIBUTING.md) — Full contribution guide
                      - 🐛 [Open an Issue](https://github.com/Stewie-pixel/claude-with-leetcode/issues/new) — Found a bug or have a suggestion?
                      - 💬 [Discussions](https://github.com/Stewie-pixel/claude-with-leetcode/discussions) — Questions and ideas

                      If you have any questions, feel free to tag **@maintainers** or mention **@mirabile** in a comment for an automated review.

                      Thank you for helping the community learn DSA better — one problem at a time. 🚀`;

                      await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: prNumber,
                          body: comment,
                      });

                      console.log(`Posted welcome comment to PR #${prNumber} for @${contributor} (first time: ${isFirstTime})`);
