name: Issue Deduplication

on:
    issues:
        types:
            - 'opened'
            - 'reopened'
    issue_comment:
        types:
            - 'created'
    workflow_dispatch:
        inputs:
            issue_number:
                description: 'issue number to dedup'
                required: true
                type: 'number'

jobs:
    deduplicate:
        runs-on: ubuntu-latest
        if: >-
            github.repository == 'Stewie-pixel/claude-with-leetcode' &&
            github.actor != 'mirabile-cli[bot]' &&
            github.event.issue.pull_request == null &&
            (
              github.event_name == 'issues' ||
              github.event_name == 'workflow_dispatch' ||
              (github.event_name == 'issue_comment' &&
               github.event.comment.user.login != 'mirabile-cli[bot]')
            )

        permissions:
            issues: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: 'Generate GitHub App Token'
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Check for duplicate issues
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
              uses: actions/github-script@v9
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const { default: deduplicate } = await import('${{ github.workspace }}/.github/scripts/deduplicate-issues.mjs');
                      await deduplicate({ github, context });
